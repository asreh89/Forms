<style>
body{
    font-family: Arial;
    margin:40px;
}
#results{
    margin-top:20px;
    white-space:pre-line;
}
</style>

</head>

<body>

<h2>Mortgage Amortization Calculator</h2>

<button id="Button1">Run Amortization Calculator</button>

<div id="results"></div>

<script>

document.getElementById("Button1").addEventListener("click", runCalculator);

function runCalculator(){

    let interestRate = 0.0575;

    let loanAmount = parseFloat(prompt("Enter the loan amount (no commas):"));

    let termYears = parseInt(prompt("Enter the loan term in years (15 or 30):"));

    if(termYears !== 15 && termYears !== 30){
        alert("Loan term must be either 15 or 30 years.");
        return;
    }

    let monthlyPayment = (((interestRate / 12) * loanAmount) /
    (1 - Math.pow(1 + (interestRate / 12), (termYears * -12)))).toFixed(2);

    monthlyPayment = parseFloat(monthlyPayment);

    let termMonths = termYears * 12;

    let totalInterest = ((monthlyPayment * termMonths) - loanAmount).toFixed(2);

    let totalLoan = (loanAmount + parseFloat(totalInterest)).toFixed(2);

    let output = "";

    output += "Mortgage term in years: " + termYears + "\n";
    output += "Mortgage interest rate: 5.75%\n";
    output += "Mortgage amount (loan amount): $" + loanAmount.toFixed(2) + "\n";
    output += "Total interest amount: $" + totalInterest + "\n";
    output += "Total mortgage amount: $" + totalLoan + "\n\n";

    output += "Monthly Payment: $" + monthlyPayment.toFixed(2) + "\n\n";

    let balance = parseFloat(totalLoan);

    for(let i = 1; i <= termMonths; i++){

        balance = (balance - monthlyPayment).toFixed(2);

        if(balance < 0){
            balance = 0;
        }

        output += "Month " + i +
        " | Payment: $" + monthlyPayment.toFixed(2) +
        " | Balance: $" + balance + "\n";

        if(balance == 0){
            output += "\nThis is the Ending Amortization Calculator...";
            break;
        }
    }

    document.getElementById("results").innerText = output;
}

</script>

</body>
</html>
